function progHTML(f){
  if (!(f.progresso && f.progresso.total > 0)) return '';
  const pct = Math.min(100, Math.round(f.progresso.atual/f.progresso.total*100));
  return `<div class="prog">
      <div class="row">
        <span class="lbl">${esc(f.progresso.label)}</span>
        <span class="frac">${f.progresso.atual}/${f.progresso.total} · ${pct}%</span>
      </div>
      <div class="bar"><i style="width:${pct}%"></i></div>
    </div>`;
}

function calendarItems(){
  const items = [];
  FRENTES.forEach((f,fi)=>{
    if (Array.isArray(f.eventos) && f.eventos.length){
      f.eventos.forEach((e,ei)=> items.push({fi, ei, data:e.data, tipo:e.tipo, titulo:e.titulo, obs:e.obs}));
    } else if (f.prazo){
      items.push({fi, ei:-1, data:f.prazo, tipo:'entrega', titulo:f.proxima_acao, obs:''});
    }
  });
  return items;
}

function kpis(){
  const at = FRENTES.filter(f=>f.status==='ativo').length;
  const pa = FRENTES.filter(f=>f.status==='pausado').length;
  const semana = FRENTES.filter(f=>f.prazo && dias(f.prazo)>=0 && dias(f.prazo)<=7).length;
  const stale = FRENTES.filter(f=>f.atualizado && (HOJE-new Date(f.atualizado+'T12:00:00'))/86400000 > 7).length;
  document.getElementById('kpis').innerHTML = `
    <div class="kpi"><div class="v green">${at}</div><div class="l">frentes ativas</div></div>
    <div class="kpi"><div class="v amber">${pa}</div><div class="l">pausadas</div></div>
    <div class="kpi"><div class="v">${semana}</div><div class="l">prazos · próx. 7 dias</div></div>
    <div class="kpi"><div class="v ${stale? 'amber':''}">${stale}</div><div class="l">arquivos &gt;7d sem update</div></div>`;
}

function week(){
  const DIAS = ['dom','seg','ter','qua','qui','sex','sáb'];
  const items = calendarItems();
  const cells = [];
  let temEvento = false;
  const fim = new Date(HOJE); fim.setDate(fim.getDate()+7);
  document.getElementById('week-range').textContent = fmt(HOJE)+' — '+fmt(fim);
  for(let i=0;i<8;i++){
    const d = new Date(HOJE); d.setDate(d.getDate()+i);
    const iso = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const evs = items.filter(it=>it.data===iso).map(it=>{
      temEvento = true;
      const f = FRENTES[it.fi];
      const nome = esc(f.cliente.split(' ')[0].replace('Dra.','Sandra'));
      const c = evtOf(it.tipo);
      const cond = it.obs ? ' cond' : '';
      return `<button type="button" class="ev${cond}" data-fi="${it.fi}" data-ei="${it.ei}" style="background:${c.color}" aria-label="${esc(f.cliente)} — ${esc(it.titulo||c.label)}">${nome}</button>`;
    }).join('');
    cells.push(`<div class="day ${i===0?'today':''}">
      <div class="d">${DIAS[d.getDay()]} ${String(d.getDate()).padStart(2,'0')}</div>${evs}
    </div>`);
  }
  document.getElementById('week').innerHTML = cells.join('');
  document.getElementById('week-hint').textContent = temEvento ? 'toque numa tarja pra ver do que se trata' : '';
  const tipos = [...new Set(items.map(i=>i.tipo))];
  const order = ['gravacao','entrega','reuniao','outro'].filter(t=>tipos.includes(t));
  document.getElementById('week-legend').innerHTML = order.length>1 ? order.map(t=>{
    const c = evtOf(t);
    return `<span class="lg"><span class="lg-k" style="background:${c.color}"></span>${c.label}</span>`;
  }).join('') : '';
}

let filtro = 'todos';
function filters(){
  const counts = {todos: FRENTES.length};
  FRENTES.forEach(f=>counts[f.status]=(counts[f.status]||0)+1);
  const order = ['todos','ativo','pausado','aguardando','encerrado'].filter(s=>counts[s]);
  document.getElementById('filters').innerHTML = order.map(s=>
    `<button class="chip ${s===filtro?'on':''}" data-s="${s}">${s}<span class="n">${counts[s]}</span></button>`
  ).join('');
  document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{filtro=b.dataset.s;filters();grid();});
}

function fmRow(k,v,cls=''){
  return `<div><span class="k">${k}:</span> <span class="v ${cls}">${v||'—'}</span></div>`;
}
function grid(){
  const list = FRENTES.filter(f=>filtro==='todos'||f.status===filtro);
  document.getElementById('grid').innerHTML = list.map(f=>{
    const st = stOf(f.status);
    const p = f.prazo ? rel(f.prazo) : null;
    const upd = f.atualizado ? Math.round((HOJE-new Date(f.atualizado+'T12:00:00'))/86400000) : null;
    const progHtml = progHTML(f);
    return `
    <article class="card" style="--st-color:${st.color};--st-bg:${st.bg}">
      <div class="card-head">
        <div>
          <h2>${esc(f.cliente)}</h2>
          <div class="tipo">${esc(f.tipo)}</div>
        </div>
        <span class="badge"><span class="dot ${p&&p.soon?'pulse':''}"></span>${esc(f.status)}</span>
      </div>
      <div class="fm">
        ${fmRow('fase', esc(f.fase))}
        ${fmRow('proxima_acao', esc(f.proxima_acao), 'hl')}
        ${fmRow('prazo', f.prazo ? `${fmt(new Date(f.prazo+'T12:00:00'))} · ${p.t}` : '', p&&p.soon?'warn':'')}
      </div>
      ${progHtml}
      <div class="card-foot">
        <span title="${esc(f.arquivo)}">${esc(f.arquivo.split('/').slice(-2).join('/'))}</span>
        <span class="${upd!==null&&upd>7?'stale':''}">${upd===null?'':(upd===0?'atualizado hoje':`atualizado há ${upd}d`)}</span>
      </div>
    </article>`;
  }).join('');
}

function timeline(){
  const comPrazo = FRENTES.filter(f=>f.prazo).sort((a,b)=>a.prazo.localeCompare(b.prazo));
  const el = document.getElementById('timeline');
  if(!comPrazo.length){
    el.innerHTML = '<li class="empty">Nenhum prazo registrado.</li>';
    return;
  }
  el.innerHTML = comPrazo.map(f=>{
    const p = rel(f.prazo);
    return `<li>
      <span class="when ${p.soon?'soon':''}">${fmt(new Date(f.prazo+'T12:00:00'))} · ${p.t}</span>
      <span class="what">${esc(f.proxima_acao)}</span>
      <span class="who">${esc(f.cliente.split(' (')[0])}</span>
    </li>`;
  }).join('');
}

function sheetHTML(f, ev){
  const dateIso = ev ? ev.data : f.prazo;
  const p = dateIso ? rel(dateIso) : null;
  const upd = f.atualizado ? Math.round((HOJE-new Date(f.atualizado+'T12:00:00'))/86400000) : null;
  const oque = ev ? (esc(ev.titulo) || '—') : esc(f.proxima_acao);
  let lead;
  if (ev){
    const c = evtOf(ev.tipo);
    lead = `<span class="evt-chip" style="--evc:${c.color}">${c.label}</span>`;
  } else {
    lead = `<span class="sheet-when-lbl">Nesta data</span>`;
  }
  const obsRow = (ev && ev.obs) ? `<div class="sheet-obs"><span>⚠</span>${esc(ev.obs)}</div>` : '';
  return `
    <div class="card-head">
      <div>
        <h2>${esc(f.cliente)}</h2>
        <div class="tipo">${esc(f.tipo)}</div>
      </div>
      <span class="badge"><span class="dot ${p&&p.soon?'pulse':''}"></span>${esc(f.status)}</span>
    </div>
    <div class="sheet-when">
      ${lead}
      <span class="sheet-when-val">${dateIso ? fmt(new Date(dateIso+'T12:00:00'))+' · '+p.t : '—'}</span>
    </div>
    ${obsRow}
    <div class="fm">
      ${fmRow('o que é', oque, 'hl')}
      ${fmRow('fase', esc(f.fase))}
    </div>
    ${progHTML(f)}
    <div class="card-foot">
      <span title="${esc(f.arquivo)}">${esc(f.arquivo.split('/').slice(-2).join('/'))}</span>
      <span class="${upd!==null&&upd>7?'stale':''}">${upd===null?'':(upd===0?'atualizado hoje':`atualizado há ${upd}d`)}</span>
    </div>`;
}
function openSheet(fi, ei){
  const f = FRENTES[fi];
  if(!f) return;
  const ev = (ei>=0 && Array.isArray(f.eventos) && f.eventos[ei]) ? f.eventos[ei] : null;
  const st = stOf(f.status);
  const sheet = document.getElementById('sheet');
  sheet.style.setProperty('--st-color', st.color);
  sheet.style.setProperty('--st-bg', st.bg);
  document.getElementById('sheet-body').innerHTML = sheetHTML(f, ev);
  const wrap = document.getElementById('sheet-wrap');
  wrap.classList.add('open');
  wrap.setAttribute('aria-hidden','false');
  document.body.style.overflow='hidden';
  document.getElementById('sheet-close').focus();
}
function closeSheet(){
  const wrap = document.getElementById('sheet-wrap');
  wrap.classList.remove('open');
  wrap.setAttribute('aria-hidden','true');
  document.body.style.overflow='';
}

document.getElementById('week').addEventListener('click', e=>{
  const el = e.target.closest('.ev');
  if(el) openSheet(+el.dataset.fi, +el.dataset.ei);
});
document.getElementById('sheet-backdrop').addEventListener('click', closeSheet);
document.getElementById('sheet-close').addEventListener('click', closeSheet);
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeSheet(); });

document.getElementById('now').textContent =
  'GERADO ' + fmt(GERADO) + ' ' + GERADO.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
document.getElementById('gen-stamp').textContent =
  'GERADO AUTOMATICAMENTE DO VAULT · ' + GERADO.toLocaleString('pt-BR');
kpis(); week(); filters(); grid(); timeline();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
